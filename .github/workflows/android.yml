name: Release Build
run-name: Release Build - ${{ github.ref_name }}

on:
  push:
    tags:
      - "[0-9]*-*"

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  ARTIFACT_PASSWORD: Sesame-AG
  RELEASE_TAG_RAW: ${{ github.ref_name }}
  TARGET_SOURCE_BRANCH: dev
  TARGET_MODULE_REPO: Xposed-Modules-Repo/io.github.aoguai.sesameag
  PUBLISH_TO_XPOSED_REPO: "false"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      reason: ${{ steps.check.outputs.reason }}
      tag_valid: ${{ steps.meta.outputs.tag_valid }}
      tag_version_code: ${{ steps.meta.outputs.tag_version_code }}
      configured_version_name: ${{ steps.meta.outputs.configured_version_name }}
      version_name: ${{ steps.meta.outputs.version_name }}
      version_code: ${{ steps.meta.outputs.version_code }}
      xposed_tag: ${{ steps.meta.outputs.xposed_tag }}

    steps:
      - name: Set Timezone to Asia/Shanghai
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Validate Project Toolchain Baseline
        shell: bash
        run: |
          set -euo pipefail

          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          release_tag_regex='^([0-9]+)-(.+)$'
          tag_valid="false"
          tag_version_code=""
          configured_version_name=""
          version_name=""

          if [[ "${RELEASE_TAG_RAW}" =~ ${release_tag_regex} ]]; then
            tag_valid="true"
            tag_version_code="${BASH_REMATCH[1]}"
            version_name="${BASH_REMATCH[2]}"
          fi

          configured_version_name="$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')"
          if [[ -z "${configured_version_name}" ]]; then
            echo "Failed to resolve appVersion from gradle.properties" >&2
            exit 1
          fi

          version_code="$(git rev-list --count HEAD | tr -d '\n')"
          if [[ -z "${version_code}" ]]; then
            echo "Failed to resolve versionCode from git history" >&2
            exit 1
          fi

          xposed_tag="${RELEASE_TAG_RAW}"
          echo "tag_valid=${tag_valid}" >> "$GITHUB_OUTPUT"
          echo "tag_version_code=${tag_version_code}" >> "$GITHUB_OUTPUT"
          echo "configured_version_name=${configured_version_name}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "xposed_tag=${xposed_tag}" >> "$GITHUB_OUTPUT"

      - name: Check Signing And Target Repository
        id: check
        shell: bash
        env:
          TAG_VALID: ${{ steps.meta.outputs.tag_valid }}
          TAG_VERSION_CODE: ${{ steps.meta.outputs.tag_version_code }}
          CONFIGURED_VERSION_NAME: ${{ steps.meta.outputs.configured_version_name }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          XPOSED_TAG: ${{ steps.meta.outputs.xposed_tag }}
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
          PUBLISH_TO_XPOSED_REPO: ${{ env.PUBLISH_TO_XPOSED_REPO }}
        run: |
          set -euo pipefail

          git fetch origin "refs/heads/${TARGET_SOURCE_BRANCH}:refs/remotes/origin/${TARGET_SOURCE_BRANCH}" --force

          missing=()
          [[ -n "${ANDROID_SIGNING_KEY}" ]] || missing+=("ANDROID_SIGNING_KEY")
          [[ -n "${ANDROID_KEY_ALIAS}" ]] || missing+=("ANDROID_KEY_ALIAS")
          [[ -n "${ANDROID_KEYSTORE_PASSWORD}" ]] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [[ -n "${ANDROID_KEY_PASSWORD}" ]] || missing+=("ANDROID_KEY_PASSWORD")
          if [[ "${PUBLISH_TO_XPOSED_REPO}" == "true" ]]; then
            [[ -n "${TARGET_REPO_PAT}" ]] || missing+=("TARGET_REPO_PAT")
          fi

          ready="false"
          reason=""

          if [[ ${#missing[@]} -gt 0 ]]; then
            reason="缺少必要 Secrets: ${missing[*]}"
          elif [[ "${TAG_VALID}" != "true" ]]; then
            reason="标签 ${RELEASE_TAG_RAW} 不符合 Xposed 要求的 VersionCode-VersionName 格式"
          elif [[ "${VERSION_NAME}" != "${CONFIGURED_VERSION_NAME}" ]]; then
            reason="标签中的 versionName (${VERSION_NAME}) 与 gradle.properties 中配置的 appVersion (${CONFIGURED_VERSION_NAME}) 不一致"
          elif [[ "${TAG_VERSION_CODE}" != "${VERSION_CODE}" ]]; then
            reason="标签中的 versionCode (${TAG_VERSION_CODE}) 与当前提交计算得到的 versionCode (${VERSION_CODE}) 不一致"
          elif ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${TARGET_SOURCE_BRANCH}"; then
            reason="标签 ${RELEASE_TAG_RAW} 指向的提交不在 ${TARGET_SOURCE_BRANCH} 分支上"
          elif [[ "${PUBLISH_TO_XPOSED_REPO}" != "true" ]]; then
            ready="true"
            reason="预检通过"
          else
            api_url="https://api.github.com/repos/${TARGET_MODULE_REPO}"
            if http_code="$(curl -sS -o target_repo.json -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TARGET_REPO_PAT}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_url}")"; then
              case "${http_code}" in
                200)
                  ready="true"
                  reason="预检通过，将发布到 ${TARGET_MODULE_REPO}"
                  ;;
                401|403)
                  reason="TARGET_REPO_PAT 无法访问 ${TARGET_MODULE_REPO} (HTTP ${http_code})"
                  ;;
                404)
                  reason="目标 Xposed 模块仓库不存在: ${TARGET_MODULE_REPO}"
                  ;;
                *)
                  reason="无法确认目标 Xposed 模块仓库状态: ${TARGET_MODULE_REPO} (HTTP ${http_code})"
                  ;;
              esac
            else
              reason="检查目标 Xposed 模块仓库失败，请稍后重试"
            fi

            rm -f target_repo.json
          fi

          echo "ready=${ready}" >> "$GITHUB_OUTPUT"
          {
            echo "reason<<EOF"
            printf '%s\n' "${reason}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Release Preflight"
            echo
            echo "- 触发事件: \`push(tag)\`"
            echo "- 源仓库标签: \`${RELEASE_TAG_RAW}\`"
            echo "- 校验分支: \`${TARGET_SOURCE_BRANCH}\`"
            echo "- 标签格式有效: \`${TAG_VALID}\`"
            echo "- 标签中的版本号: \`${TAG_VERSION_CODE}\`"
            echo "- 配置中的版本名: \`${CONFIGURED_VERSION_NAME}\`"
            echo "- 版本名称: \`${VERSION_NAME}\`"
            echo "- 版本号: \`${VERSION_CODE}\`"
            echo "- 模块仓库标签: \`${XPOSED_TAG}\`"
            echo "- 目标仓库: \`${TARGET_MODULE_REPO}\`"
            echo "- 发布到目标仓库: \`${PUBLISH_TO_XPOSED_REPO}\`"
            echo "- 检查结果: ${reason}"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set Timezone to Asia/Shanghai
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: x64
          check-latest: false
          cache: gradle

      - name: Pin Gradle Java Home
        shell: bash
        run: |
          set -euo pipefail
          echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Required Android SDK Packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"
          # `yes` will receive SIGPIPE after sdkmanager finishes reading input.
          # Run this pipeline without pipefail so the step reflects sdkmanager's exit code.
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Print Toolchain Versions
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "ORG_GRADLE_JAVA_HOME=${ORG_GRADLE_JAVA_HOME}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          java -version
          sdkmanager --version
          ./gradlew --version

      - name: Build Release APKs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Stage Unsigned APKs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "No release APKs found in ${RELEASE_DIR}" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done

      - name: Sign APKs
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Generate Release Notes
        id: release_notes
        shell: bash
        env:
          GITHUB_API_TOKEN: ${{ secrets.TARGET_REPO_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
          XPOSED_TAG: ${{ needs.preflight.outputs.xposed_tag }}
        run: |
          set -euo pipefail

          body_path="${RUNNER_TEMP}/xposed-release-body.md"
          tag_object_type="$(git cat-file -t "${GITHUB_REF}" 2>/dev/null || true)"
          repo_name="${REPOSITORY#*/}"
          tag_notes=""
          prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          commit_history_url="https://github.com/${REPOSITORY}/commits/${RELEASE_TAG_RAW}"
          compare_url=""
          commit_range_display="首次发布（完整历史）"
          range_args=("${GITHUB_SHA}")
          excluded_type_regex='^(docs|style|ci|test|build)(\([^)]*\))?[!]?:[[:space:]]+'
          commit_type_regex='^([[:alpha:]]+)(\([^)]*\))?[!]?:[[:space:]]+'
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          categories=(feat fix perf refactor revert other)
          declare -A category_titles=(
            [feat]="新功能"
            [fix]="问题修复"
            [perf]="性能优化"
            [refactor]="重构调整"
            [revert]="回滚变更"
            [other]="其他更新"
          )

          for category in "${categories[@]}"; do
            : > "${tmp_dir}/${category}.md"
          done

          if [[ "${tag_object_type}" == "tag" ]]; then
            tag_notes="$(git for-each-ref "${GITHUB_REF}" --format='%(contents)')"
          fi

          if [[ -n "${prev_tag}" ]]; then
            compare_url="https://github.com/${REPOSITORY}/compare/${prev_tag}...${RELEASE_TAG_RAW}"
            commit_range_display="${prev_tag}...${RELEASE_TAG_RAW}"
            range_args=("${prev_tag}..${GITHUB_SHA}")
          fi

          contributors_path="${tmp_dir}/contributors.tsv"
          : > "${contributors_path}"
          declare -A seen_release_author=()
          relevant_commit_count=0

          while IFS=$'\t' read -r commit_sha commit_subject author_name author_email; do
            [[ -n "${commit_sha}" ]] || continue

            author_key="${author_name}|${author_email,,}"
            if [[ -z "${seen_release_author[$author_key]+x}" ]]; then
              seen_release_author[$author_key]=1
              printf '%s\t%s\t%s\n' \
                "${commit_sha}" \
                "${author_name}" \
                "${author_email}" \
                >> "${contributors_path}"
            fi

            if [[ "${commit_subject}" =~ ${excluded_type_regex} ]]; then
              continue
            fi

            category="other"
            if [[ "${commit_subject}" =~ ${commit_type_regex} ]]; then
              commit_type="${BASH_REMATCH[1],,}"
              case "${commit_type}" in
                feat|fix|perf|refactor|revert)
                  category="${commit_type}"
                  ;;
                docs|style|ci|test|build)
                  continue
                  ;;
              esac
            fi

            relevant_commit_count=$((relevant_commit_count + 1))
            short_sha="${commit_sha:0:7}"
            printf -- "- %s ([%s](https://github.com/%s/commit/%s))\n" \
              "${commit_subject}" \
              "${short_sha}" \
              "${REPOSITORY}" \
              "${commit_sha}" \
              >> "${tmp_dir}/${category}.md"
          done < <(git log --reverse --format='%H%x09%s%x09%an%x09%ae' "${range_args[@]}")

          contributor_html=""
          contributor_names=()
          declare -A seen_contributor=()

          while IFS=$'\t' read -r contributor_sha contributor_name contributor_email; do
            [[ -n "${contributor_sha}" ]] || continue

            api_json="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/commits/${contributor_sha}" || true)"

            contributor_login=""
            contributor_avatar_url=""

            if [[ -n "${api_json}" ]]; then
              contributor_login="$(python3 -c 'import json,sys; data=json.load(sys.stdin); print(((data.get("author") or {}).get("login") or "").strip())' <<< "${api_json}")"
              contributor_avatar_url="$(python3 -c 'import json,sys; data=json.load(sys.stdin); print(((data.get("author") or {}).get("avatar_url") or "").strip())' <<< "${api_json}")"
            fi

            dedupe_key="${contributor_login:-${contributor_name}|${contributor_email}}"
            if [[ -n "${seen_contributor[$dedupe_key]+x}" ]]; then
              continue
            fi
            seen_contributor[$dedupe_key]=1

            contributor_label="${contributor_name}"
            if [[ -n "${contributor_login}" ]]; then
              contributor_label="@${contributor_login}"
            fi

            contributor_names+=("${contributor_label}")

            if [[ -n "${contributor_login}" && -n "${contributor_avatar_url}" ]]; then
              contributor_html+="$(
                printf '<a href="https://github.com/%s" title="%s"><img src="%s" width="40" height="40" alt="%s" style="border-radius:50%%;margin:0 6px 6px 0;" /></a>' \
                  "${contributor_login}" \
                  "${contributor_label}" \
                  "${contributor_avatar_url}" \
                  "${contributor_label}"
              )"
            fi
          done < "${contributors_path}"

          {
            echo "内容同步自源仓库 [${repo_name}](https://github.com/${REPOSITORY})"
            echo
            echo "源仓库标签：\`${RELEASE_TAG_RAW}\`"
            echo "模块仓库标签：\`${XPOSED_TAG}\`"
            echo "变更范围：\`${commit_range_display}\`"
            echo

            if [[ -n "${tag_notes//[[:space:]]/}" ]]; then
              echo "## 发布备注"
              echo
              echo "${tag_notes}"
              echo
            fi

            if [[ ${relevant_commit_count} -gt 0 ]]; then
              echo "## 变更说明"
              echo
              for category in "${categories[@]}"; do
                if [[ -s "${tmp_dir}/${category}.md" ]]; then
                  echo "### ${category_titles[$category]}"
                  echo
                  cat "${tmp_dir}/${category}.md"
                  echo
                fi
              done
            fi

            if [[ ${#contributor_names[@]} -gt 0 ]]; then
              echo "## 本轮贡献者"
              echo

              if [[ -n "${contributor_html}" ]]; then
                echo "<p>${contributor_html}</p>"
                echo
              fi

              joined_contributors=""
              for contributor_name in "${contributor_names[@]}"; do
                if [[ -n "${joined_contributors}" ]]; then
                  joined_contributors+="、"
                fi
                joined_contributors+="${contributor_name}"
              done
              echo "感谢以下参与本轮更新提交的开发者：${joined_contributors}"
              echo
            fi

            echo "## Full Changelog"
            echo
            if [[ -n "${compare_url}" ]]; then
              echo "- 对比视图：${compare_url}"
            fi
            echo "- 提交历史：${commit_history_url}"
            echo

            echo "> ## 下载说明"
            echo "<b>- arm64-v8a:</b> 适用于64位 ARM 设备 (主流新手机)"
            echo "<b>- armeabi-v7a:</b> 适用于32位 ARM 设备 (旧款手机)"
            echo "<b>- x86 / x86_64:</b> 主要用于 PC 上的安卓模拟器"
            echo "<b>- universal:</b> 通用版 (不确定时使用，体积较大)"
            echo ">"
            echo "> **如果不确定，请下载 \`universal\` 版本。**"
          } > "${body_path}"

          echo "body_path=${body_path}" >> "$GITHUB_OUTPUT"

      - name: Prepare Release Assets
        id: prepare_assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ASSET_DIR}"
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          copied=0
          for file in "${files[@]}"; do
            [[ -n "${file}" ]] || continue
            cp "${file}" "${ASSET_DIR}/"
            (
              cd "${ASSET_DIR}"
              sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256"
            )
            copied=$((copied + 1))
          done
          if [[ ${copied} -eq 0 ]]; then
            echo "No signed APKs were produced" >&2
            exit 1
          fi
          if [[ "${PUBLISH_TO_XPOSED_REPO}" != "true" ]]; then
            cp "${{ steps.release_notes.outputs.body_path }}" "${ASSET_DIR}/RELEASE_NOTES-${RELEASE_TAG_RAW}.md"
          fi
          echo "asset_dir=${ASSET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package APK Artifact
        if: env.PUBLISH_TO_XPOSED_REPO != 'true'
        id: package_artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_path="${RUNNER_TEMP}/Sesame-AG-${RELEASE_TAG_RAW}.zip"
          (
            cd "${ASSET_DIR}"
            zip -r -P "${ARTIFACT_PASSWORD}" "${artifact_path}" .
          )
          echo "artifact_path=${artifact_path}" >> "$GITHUB_OUTPUT"

      - name: Upload APK Artifact
        if: env.PUBLISH_TO_XPOSED_REPO != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Sesame-AG-${{ github.ref_name }}
          archive: false
          path: ${{ steps.package_artifact.outputs.artifact_path }}
          if-no-files-found: error

      - name: Sync Release to Target Repository
        if: env.PUBLISH_TO_XPOSED_REPO == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.TARGET_MODULE_REPO }}
          name: ${{ needs.preflight.outputs.version_name }}
          files: |
            ${{ steps.prepare_assets.outputs.asset_dir }}/*
          token: ${{ secrets.TARGET_REPO_PAT }}
          tag_name: ${{ needs.preflight.outputs.xposed_tag }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          generate_release_notes: false
          body_path: ${{ steps.release_notes.outputs.body_path }}

  skip:
    needs: preflight
    if: needs.preflight.outputs.ready != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Report Skip Reason
        shell: bash
        run: |
          set -euo pipefail
          echo "Release workflow skipped: ${{ needs.preflight.outputs.reason }}"
          {
            echo "## Release Skipped"
            echo
            echo "- 原因: ${{ needs.preflight.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
